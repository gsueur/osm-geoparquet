<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>parquet viewer · geomermaids</title>
<link rel="canonical" href="https://geoparquet.geomermaids.com/viewer.html">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Quick map preview of any GeoParquet file from parquetry.geomermaids.com — paste a URL, see what's inside.">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --accent: #d2553a;
    --border: #e5e5e5;
    --code-bg: #f6f6f4;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414;
      --fg: #e8e8e8;
      --muted: #9a9a9a;
      --accent: #f08a6e;
      --border: #2e2e2e;
      --code-bg: #0f0f0f;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: .65rem;
    padding: .65rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
  }
  .toolbar h1 {
    font-size: .95rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.005em;
    white-space: nowrap;
  }
  .toolbar h1 a { color: inherit; text-decoration: none; }
  .toolbar h1 a:hover { color: var(--accent); }
  .toolbar input[type=url] {
    flex: 1;
    min-width: 220px;
    padding: .42rem .6rem;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: .82rem;
  }
  .toolbar input:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .toolbar button {
    padding: .42rem 1rem;
    background: var(--accent);
    color: white;
    border: 1px solid var(--accent);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: .88rem;
    white-space: nowrap;
  }
  .toolbar button:hover { filter: brightness(1.08); }
  .toolbar button:disabled { opacity: .55; cursor: not-allowed; filter: none; }
  .toolbar .btn-link {
    padding: .42rem 1rem;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-family: var(--sans);
    font-size: .88rem;
    text-decoration: none;
    white-space: nowrap;
  }
  .toolbar .btn-link:hover { background: var(--accent); color: white; }
  .toolbar .btn-link[hidden] { display: none; }
  .toolbar .counter {
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--muted);
    white-space: nowrap;
    padding: .2rem .5rem;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }
  .toolbar .counter.partial {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
  }
  .toolbar .counter[hidden] { display: none; }

  #map { flex: 1; position: relative; }

  .status {
    position: absolute;
    bottom: .9rem;
    left: .9rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .45rem .7rem;
    font-size: .82rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    max-width: 380px;
    pointer-events: none;
  }
  .status.err { color: var(--accent); }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .3rem .55rem;
    font-size: .8rem;
    font-family: var(--mono);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    z-index: 10;
    max-width: 280px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1><a href="/">geomermaids</a> &middot; viewer</h1>
  <input type="url" id="url" placeholder="https://parquetry.geomermaids.com/latest/...">
  <button id="load" disabled>Load</button>
  <a id="download" class="btn-link" download hidden>Download</a>
  <span id="counter" class="counter" hidden></span>
</div>

<div id="map">
  <div class="status" id="status">Initialising DuckDB-WASM&hellip;</div>
  <div class="tooltip" id="tooltip" style="display: none"></div>
</div>

<script type="module">
  // Single-file GeoParquet viewer.
  //
  // Uses DuckDB-WASM + httpfs to read a parquet from parquetry.geomermaids.com
  // via HTTP Range requests (no full download), filters to the visible viewport
  // on pan/zoom, and renders with deck.gl. Capped at MAX_FEATURES per query so
  // the GPU stays smooth on large states.

  import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/+esm';

  // deck.gl ships a single-script UMD bundle — load it as a global.
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/deck.gl@9.3.1/dist.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  const {
    Deck, MapView, WebMercatorViewport, TileLayer, BitmapLayer, GeoJsonLayer,
    SolidPolygonLayer, PathLayer, FlyToInterpolator,
  } = window.deck;

  const DEFAULT_URL = 'https://parquetry.geomermaids.com/latest/country=US/state=US-DC/buildings.parquet';
  const MAX_FEATURES = 25000;
  const VIEWPORT_DEBOUNCE_MS = 300;
  const ACCENT = [210, 85, 58];

  const statusEl = document.getElementById('status');
  const tooltipEl = document.getElementById('tooltip');
  const urlEl = document.getElementById('url');
  const loadBtn = document.getElementById('load');
  const downloadEl = document.getElementById('download');
  const counterEl = document.getElementById('counter');

  function setCounter(shown, total) {
    if (shown == null || total == null) {
      counterEl.hidden = true;
      return;
    }
    const partial = shown < total;
    counterEl.hidden = false;
    counterEl.classList.toggle('partial', partial);
    counterEl.textContent = partial
      ? `${shown.toLocaleString()} / ${total.toLocaleString()} — zoom in for more`
      : `${shown.toLocaleString()} features`;
    counterEl.title = partial
      ? `Capped at ${MAX_FEATURES.toLocaleString()} features per query. Zoom or pan to load other areas.`
      : 'All features in the file are loaded.';
  }

  function setStatus(msg, isErr = false) {
    statusEl.className = 'status' + (isErr ? ' err' : '');
    statusEl.textContent = msg;
  }

  // ---------- DuckDB-WASM bootstrap ----------------------------------------

  setStatus('Initialising DuckDB-WASM…');
  const bundles = duckdb.getJsDelivrBundles();
  const bundle = await duckdb.selectBundle(bundles);
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(workerUrl);
  const conn = await db.connect();
  // INSTALL is a no-op when the extension is already bundled; LOAD is what
  // matters. Spatial isn't bundled in standard releases, so install fetches
  // it from extensions.duckdb.org (CORS-friendly).
  await conn.query('INSTALL spatial; LOAD spatial; INSTALL httpfs; LOAD httpfs;');

  loadBtn.disabled = false;

  // ---------- Map setup ----------------------------------------------------

  let viewState = {
    longitude: -98, latitude: 39, zoom: 3.5,
    pitch: 0, bearing: 0,
  };
  let geomKind = 'point';        // 'point' | 'line' | 'polygon'
  let totalCount = 0;
  let hasFullFile = false;       // true when initial query returned < MAX
  let currentUrl = null;
  let queryToken = 0;            // monotonic; lets stale responses be ignored
  let viewportTimer = null;
  let lastFeatures = [];
  let pendingAutoLoadUrl = null;
  // Number of queries currently in flight against the DuckDB worker.
  // We only call conn.cancelSent() when this is > 0; cancelling on an
  // idle connection puts the worker in a state where the very next
  // send rejects with an empty-message onMessage error.
  let inFlightCount = 0;
  // Refresh gate: only fire viewport refreshes after a real user
  // interaction. Programmatic camera moves (FlyToInterpolator after
  // inspectFile, page-load fit) emit onViewStateChange events that
  // would otherwise trigger stage 1 / stage 2 right after the initial
  // unbounded query — wiping the just-painted full feature set with a
  // 1500-row subset before stage 2 catches up. Cleared by loadFile,
  // set by a mousedown / wheel / touchstart listener on the map.
  let userInteractionSeen = false;

  const basemapLayer = () => new TileLayer({
    id: 'basemap',
    data: 'https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
    minZoom: 0, maxZoom: 19, tileSize: 256,
    renderSubLayers: ({ tile, ...props }) => {
      const [[w, s], [e, n]] = tile.boundingBox;
      return new BitmapLayer(props, { data: null, image: props.data, bounds: [w, s, e, n] });
    },
  });

  // Build the data layer(s) for whatever lastFeatures currently holds:
  //   binary: { positions, startIndices, length } -> SolidPolygonLayer +
  //           PathLayer (fill + outline; one shared binary buffer)
  //   array of GeoJSON features                  -> single GeoJsonLayer
  //   empty array                                -> nothing rendered
  function buildDataLayers(data) {
    if (!data) return [];
    if (data.binary) {
      const polyData = {
        length: data.length,
        startIndices: data.startIndices,
        attributes: { getPolygon: { value: data.positions, size: 2 } },
      };
      const lineData = {
        length: data.length,
        startIndices: data.startIndices,
        attributes: { getPath: { value: data.positions, size: 2 } },
      };
      return [
        new SolidPolygonLayer({
          id: 'features-fill',
          data: polyData,
          _normalize: false,
          _windingOrder: 'CCW',
          pickable: true,
          filled: true,
          getFillColor: [...ACCENT, 110],
        }),
        new PathLayer({
          id: 'features-stroke',
          data: lineData,
          _pathType: 'open',
          pickable: false,
          widthMinPixels: 1,
          getColor: [...ACCENT, 230],
        }),
      ];
    }
    if (Array.isArray(data) && data.length > 0) {
      return [new GeoJsonLayer({
        id: 'features',
        data: { type: 'FeatureCollection', features: data },
        pickable: true,
        stroked: true,
        filled: false,
        pointRadiusMinPixels: 3,
        pointRadiusMaxPixels: 7,
        lineWidthMinPixels: geomKind === 'line' ? 2 : 1,
        getFillColor: [...ACCENT, 110],
        getLineColor: [...ACCENT, 230],
      })];
    }
    return [];
  }

  function rerender() {
    deckInstance.setProps({
      viewState,
      layers: [basemapLayer(), ...buildDataLayers(lastFeatures)],
    });
  }

  function dataRowCount(data) {
    if (!data) return 0;
    if (data.binary) return data.rowCount;
    return data.rowCount ?? data.length ?? 0;
  }

  // Throttle progressive rerenders to one per animation frame. Without
  // this the streaming-fetch loop fires rerender on every batch, which
  // can land 10+ deck.gl re-layouts per frame on dense files.
  let rafScheduled = false;
  function scheduleRender() {
    if (rafScheduled) return;
    rafScheduled = true;
    requestAnimationFrame(() => {
      rafScheduled = false;
      rerender();
    });
  }

  let deckReady = false;
  const deckInstance = new Deck({
    parent: document.getElementById('map'),
    // Controlled viewState (not initialViewState) — required so programmatic
    // setProps({viewState}) actually moves the camera. With initialViewState
    // deck.gl owns the viewport internally and ignores later viewState props.
    viewState,
    controller: true,
    views: new MapView({ repeat: true }),
    layers: [basemapLayer()],
    getCursor: ({ isDragging, isHovering }) =>
      isDragging ? 'grabbing' : (isHovering ? 'pointer' : 'grab'),
    onLoad: () => {
      // Deck's GL device + first render are ready. Programmatic camera
      // moves before this point are silently dropped (the controller
      // hasn't bound to props yet), which is why auto-load worked when
      // the user clicked Load — by then deck was warm.
      deckReady = true;
      if (pendingAutoLoadUrl) {
        const u = pendingAutoLoadUrl;
        pendingAutoLoadUrl = null;
        loadFile(u);
      }
    },
    onViewStateChange: ({ viewState: vs, interactionState }) => {
      viewState = vs;
      deckInstance.setProps({ viewState: vs });
      // Always schedule — the 300ms debounce coalesces rapid-fire events
      // (mousewheel zoom, drag-pan) into a single refresh after the user
      // settles. Earlier interactionState gating was too strict and
      // suppressed legitimate refreshes on wheel zoom.
      scheduleViewportRefresh(interactionState);
    },
    onClick: () => { tooltipEl.style.display = 'none'; },
    onHover: ({ object, index, x, y }) => {
      // Two paths: GeoJsonLayer hover gives a Feature in `object`;
      // SolidPolygonLayer (binary mode) hover gives an `index` into
      // the binary length, which we map back to the input row via
      // polyToRow → labels.
      let label = '';
      if (object && object.properties && object.properties.label) {
        label = object.properties.label;
      } else if (lastFeatures && lastFeatures.binary && index >= 0) {
        const rowIdx = lastFeatures.polyToRow[index];
        if (rowIdx != null) label = lastFeatures.labels[rowIdx] || '';
      }
      if (label) {
        tooltipEl.style.left = (x + 12) + 'px';
        tooltipEl.style.top = (y + 12) + 'px';
        tooltipEl.textContent = label;
        tooltipEl.style.display = 'block';
      } else {
        tooltipEl.style.display = 'none';
      }
    },
  });

  // ---------- Query helpers ------------------------------------------------

  function escUrl(u) {
    // Embed the URL safely inside a single-quoted SQL literal.
    return u.replace(/'/g, "''");
  }

  // Tiny WKB → GeoJSON-geometry parser for point/line themes (the
  // simple, low-volume cases). For polygon themes we use a separate
  // wkbToPolygonRings path that writes directly into typed arrays for
  // deck.gl's binary attribute API — no GeoJSON Feature objects, no
  // per-coordinate JS array allocations. 2D only.
  function parseWKB(buf) {
    const view = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
    let pos = 0;
    function readPoint(le) {
      const x = view.getFloat64(pos, le); pos += 8;
      const y = view.getFloat64(pos, le); pos += 8;
      return [x, y];
    }
    function readRing(le) {
      const n = view.getUint32(pos, le); pos += 4;
      const ring = new Array(n);
      for (let i = 0; i < n; i++) ring[i] = readPoint(le);
      return ring;
    }
    function readGeom() {
      const le = view.getUint8(pos) === 1; pos += 1;
      const type = view.getUint32(pos, le); pos += 4;
      // Strip Z/M flags (per WKB1: 1000=Z, 2000=M, 3000=ZM, plus EWKB's
      // 0x80000000 high-bits). We just want the base type for 2D output.
      const base = type & 0xff;
      if (base === 1) return { type: 'Point', coordinates: readPoint(le) };
      if (base === 2) return { type: 'LineString', coordinates: readRing(le) };
      if (base === 3) {
        const numRings = view.getUint32(pos, le); pos += 4;
        const rings = new Array(numRings);
        for (let i = 0; i < numRings; i++) rings[i] = readRing(le);
        return { type: 'Polygon', coordinates: rings };
      }
      if (base === 4) {
        const n = view.getUint32(pos, le); pos += 4;
        const pts = new Array(n);
        for (let i = 0; i < n; i++) { pos += 5; pts[i] = readPoint(le); }
        return { type: 'MultiPoint', coordinates: pts };
      }
      if (base === 5) {
        const n = view.getUint32(pos, le); pos += 4;
        const lines = new Array(n);
        for (let i = 0; i < n; i++) { pos += 5; lines[i] = readRing(le); }
        return { type: 'MultiLineString', coordinates: lines };
      }
      if (base === 6) {
        const n = view.getUint32(pos, le); pos += 4;
        const polys = new Array(n);
        for (let i = 0; i < n; i++) {
          pos += 5; // sub-geom WKB header
          const numRings = view.getUint32(pos, le); pos += 4;
          const rings = new Array(numRings);
          for (let j = 0; j < numRings; j++) rings[j] = readRing(le);
          polys[i] = rings;
        }
        return { type: 'MultiPolygon', coordinates: polys };
      }
      if (base === 7) {
        const n = view.getUint32(pos, le); pos += 4;
        const geoms = new Array(n);
        for (let i = 0; i < n; i++) geoms[i] = readGeom();
        return { type: 'GeometryCollection', geometries: geoms };
      }
      throw new Error(`Unsupported WKB type ${type}`);
    }
    return readGeom();
  }

  // Polygon-only WKB walker — emits the outer ring of each Polygon /
  // MultiPolygon part directly into a flat coords push-array.
  // Holes are skipped (drawn as part of the outer ring; building
  // viewers don't show inner courtyards as separate cutouts and the
  // visual loss is acceptable for the speed gain).
  // Returns the number of polygon parts pushed (1 for Polygon, N for
  // MultiPolygon, 0 for non-polygon types or parse failures).
  function pushPolygonsFromWKB(buf, coordsOut, startIndicesOut) {
    const view = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
    let pos = 0;
    const le = view.getUint8(pos) === 1; pos += 1;
    const type = view.getUint32(pos, le); pos += 4;
    const base = type & 0xff;

    const skipRing = () => {
      const n = view.getUint32(pos, le); pos += 4;
      pos += n * 16;
    };
    const pushOuterRing = () => {
      const n = view.getUint32(pos, le); pos += 4;
      for (let k = 0; k < n; k++) {
        coordsOut.push(view.getFloat64(pos, le));     pos += 8;
        coordsOut.push(view.getFloat64(pos, le));     pos += 8;
      }
      startIndicesOut.push(coordsOut.length / 2);
    };
    const consumePolygon = () => {
      const numRings = view.getUint32(pos, le); pos += 4;
      if (numRings === 0) return false;
      pushOuterRing();
      for (let k = 1; k < numRings; k++) skipRing();
      return true;
    };

    if (base === 3) return consumePolygon() ? 1 : 0;
    if (base === 6) {
      const numPolys = view.getUint32(pos, le); pos += 4;
      let pushed = 0;
      for (let i = 0; i < numPolys; i++) {
        pos += 5; // sub-WKB header (endian + type)
        if (consumePolygon()) pushed++;
      }
      return pushed;
    }
    return 0;
  }

  // Build deck.gl-binary-API polygon data from raw {wkb,label} rows.
  // - positions: Float64Array of [x,y,...] for every outer-ring vertex
  // - startIndices: Uint32Array marking the start (in vertices) of
  //   each polygon part — length = polygons + 1
  // - polyToRow: maps output polygon index → input row index, used by
  //   the hover handler to find the right label
  // - labels: parallel to input rows, indexed by polyToRow[i]
  function buildPolygonBinary(rows) {
    const coords = [];
    const startIndices = [0];
    const polyToRow = [];
    const labels = new Array(rows.length);
    let parseErrors = 0;
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      labels[i] = r.label || '';
      if (!r.wkb) continue;
      let pushed = 0;
      try {
        pushed = pushPolygonsFromWKB(r.wkb, coords, startIndices);
      } catch (e) {
        parseErrors++;
        if (parseErrors <= 3) console.warn('polygon WKB parse failed:', e);
      }
      for (let p = 0; p < pushed; p++) polyToRow.push(i);
    }
    if (parseErrors > 0) console.warn(`polygon WKB parse errors: ${parseErrors}`);
    return {
      binary: true,
      positions: new Float64Array(coords),
      startIndices: new Uint32Array(startIndices),
      length: startIndices.length - 1,
      polyToRow,
      labels,
      rowCount: rows.length,
    };
  }

  // Same source rows, GeoJSON Feature[] output — used for point and
  // line themes where the volume is much lower and the binary path
  // wouldn't pay back the extra layer-juggling.
  function buildGeoJsonFeatures(rows) {
    const features = [];
    let parseErrors = 0;
    for (const r of rows) {
      if (!r.wkb) continue;
      try {
        features.push({
          type: 'Feature',
          geometry: parseWKB(r.wkb),
          properties: { label: r.label || '' },
        });
      } catch (e) {
        parseErrors++;
        if (parseErrors <= 3) console.warn('WKB parse failed:', e);
      }
    }
    if (parseErrors > 0) console.warn(`WKB parse errors: ${parseErrors}`);
    features.rowCount = rows.length;
    return features;
  }

  // Tolerance in degrees: <=1m at the equator. Bigger collapses small
  // buildings to NULL on the new GEOMETRY logical type.
  const MAX_SIMPLIFY_TOLERANCE_DEG = 0.00001;

  function simplifyToleranceFor(bbox) {
    const [w, , e] = bbox;
    if (!Number.isFinite(w) || !Number.isFinite(e) || !(e > w)) return 0;
    const mapEl = document.getElementById('map');
    const widthPx = mapEl.clientWidth || window.innerWidth;
    const degPerPx = (e - w) / Math.max(widthPx, 1);
    return Math.min(degPerPx * 0.5, MAX_SIMPLIFY_TOLERANCE_DEG);
  }

  async function fetchFeatures(url, bbox, opts = {}) {
    const {
      limit = MAX_FEATURES,
      simplify = true,
      withLabels = false,
      simplifyReferenceBbox = null,
      shouldContinue,
    } = opts;
    let where = '';
    let geomExpr = 'geometry';
    // Bbox-overlap filter via st_intersects_extent — pushes down to
    // GeoParquet 2.0's per-row-group bbox stats.
    if (bbox) {
      const [w, s, e, n] = bbox;
      if ([w, s, e, n].every(Number.isFinite) && e > w && n > s) {
        where = `WHERE st_intersects_extent(geometry, ST_MakeEnvelope(${w}, ${s}, ${e}, ${n}))`;
      } else {
        console.warn('fetchFeatures: invalid bbox, querying without filter', bbox);
      }
    }
    // Simplify scales tolerance to whatever bbox we're rendering at.
    // For viewport queries that's the WHERE bbox; for unbounded
    // initial loads the caller passes simplifyReferenceBbox (the
    // dataset extent we just fitted to). With either reference we
    // don't ship microscopic vertex detail the user can't possibly
    // see — slashes ST_AsWKB output volume + the per-feature CPU on
    // the JS-side WKB walker.
    if (simplify) {
      const ref = bbox || simplifyReferenceBbox;
      if (ref) {
        const tolerance = simplifyToleranceFor(ref);
        if (tolerance > 0) {
          geomExpr = `ST_Simplify(geometry, ${tolerance})`;
        }
      }
    }
    // Critical: only project the columns we'll render. The OSM tags MAP
    // column is huge (often >50% of file bytes); skipping it when we
    // don't need labels cuts the per-row-group I/O and decompression
    // budget in half.
    const labelExpr = withLabels
      ? `COALESCE(tags['name'], tags['ref'], '') AS label`
      : `'' AS label`;
    const sql = `
      SELECT
        ST_AsWKB(${geomExpr}) AS wkb,
        ${labelExpr}
      FROM read_parquet('${escUrl(url)}')
      ${where}
      LIMIT ${limit}
    `;
    console.log('fetchFeatures SQL:', sql.replace(/\s+/g, ' ').trim());

    // Note: conn.send() is API-streaming but DuckDB-WASM materializes
    // the result before yielding batches in 1.32. Kept for forward-
    // compatibility — when streaming actually lands, this loop benefits
    // automatically without callers changing.
    inFlightCount++;
    let stream;
    try {
      stream = await conn.send(sql);
    } catch (e) {
      inFlightCount--;
      throw e;
    }
    const rows = [];
    try {
      for await (const batch of stream) {
        if (shouldContinue && !shouldContinue()) break;
        for (const r of batch.toArray()) rows.push(r);
      }
    } finally {
      inFlightCount--;
    }
    // Polygon themes use deck.gl's binary attribute API — coords and
    // start-indices go in as typed arrays, no per-feature JS object
    // allocation. Point/line themes stay on the GeoJsonLayer path
    // since their volume is low and the binary tradeoffs aren't
    // worth the extra layer plumbing.
    return geomKind === 'polygon'
      ? buildPolygonBinary(rows)
      : buildGeoJsonFeatures(rows);
  }

  async function inspectFile(url) {
    // count(*) + a one-row geometry-type probe. Fast — count(*) on parquet
    // pulls from row-group metadata, not a full scan.
    const meta = (await conn.query(`
      SELECT
        (SELECT count(*) FROM read_parquet('${escUrl(url)}')) AS total,
        (SELECT ST_GeometryType(geometry) FROM read_parquet('${escUrl(url)}') LIMIT 1) AS gt
    `)).toArray()[0];
    const total = Number(meta.total);
    const gt = String(meta.gt || '').toUpperCase();
    let kind = 'point';
    if (gt.includes('POLYGON')) kind = 'polygon';
    else if (gt.includes('LINE')) kind = 'line';

    // Pull the dataset bbox from the parquet file's GeoParquet `geo`
    // metadata. This is a JSON blob in the parquet footer kv-metadata —
    // no scan, no spatial-function eval over the data column. The
    // GeoParquet 2.0 spec defines columns[<col>].bbox as [xmin, ymin,
    // xmax, ymax] in the column's CRS (always WGS84 for our files).
    let bbox = null;
    try {
      const md = (await conn.query(`
        SELECT value FROM parquet_kv_metadata('${escUrl(url)}') WHERE key = 'geo'
      `)).toArray()[0];
      if (md && md.value) {
        // Arrow returns BLOB columns as Uint8Array — decode to UTF-8.
        const raw = typeof md.value === 'string'
          ? md.value
          : new TextDecoder().decode(md.value);
        const geo = JSON.parse(raw);
        const col = geo.columns?.[geo.primary_column || 'geometry'];
        const b = col?.bbox;
        if (Array.isArray(b) && b.length >= 4 && b.every(Number.isFinite)) {
          bbox = [b[0], b[1], b[2], b[3]];
        }
      }
    } catch (e) {
      console.warn('geo metadata read failed; falling back to feature bbox:', e);
    }
    return { total, geomKind: kind, bbox };
  }

  // ---------- Viewport / bbox helpers --------------------------------------

  function viewportBbox() {
    // Use the map element's actual rendered size — deckInstance.width /
    // .height aren't public and were always undefined, falling through
    // to window dimensions which over-fetched (toolbar ate ~60px).
    const mapEl = document.getElementById('map');
    const width = mapEl.clientWidth || window.innerWidth;
    const height = mapEl.clientHeight || window.innerHeight;
    const vp = new WebMercatorViewport({
      ...viewState,
      width,
      height,
    });
    const b = vp.getBounds(); // [w, s, e, n]
    return [b[0], b[1], b[2], b[3]];
  }

  function bboxFromFeatures(features) {
    let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
    for (const f of features) {
      walkCoords(f.geometry, (x, y) => {
        if (x < minx) minx = x;
        if (y < miny) miny = y;
        if (x > maxx) maxx = x;
        if (y > maxy) maxy = y;
      });
    }
    return isFinite(minx) ? [minx, miny, maxx, maxy] : null;
  }

  function bboxFromBinary(d) {
    if (!d || !d.positions) return null;
    const p = d.positions;
    let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
    for (let i = 0; i < p.length; i += 2) {
      const x = p[i], y = p[i + 1];
      if (x < minx) minx = x;
      if (y < miny) miny = y;
      if (x > maxx) maxx = x;
      if (y > maxy) maxy = y;
    }
    return isFinite(minx) ? [minx, miny, maxx, maxy] : null;
  }

  function bboxFromData(d) {
    if (!d) return null;
    if (d.binary) return bboxFromBinary(d);
    if (Array.isArray(d) && d.length > 0) return bboxFromFeatures(d);
    return null;
  }

  function walkCoords(g, cb) {
    if (!g) return;
    const t = g.type;
    if (t === 'Point') return cb(g.coordinates[0], g.coordinates[1]);
    if (t === 'LineString' || t === 'MultiPoint') {
      for (const c of g.coordinates) cb(c[0], c[1]);
      return;
    }
    if (t === 'Polygon' || t === 'MultiLineString') {
      for (const r of g.coordinates) for (const c of r) cb(c[0], c[1]);
      return;
    }
    if (t === 'MultiPolygon') {
      for (const p of g.coordinates) for (const r of p) for (const c of r) cb(c[0], c[1]);
      return;
    }
    if (t === 'GeometryCollection') {
      for (const sub of g.geometries) walkCoords(sub, cb);
    }
  }

  function fitToBbox(bbox, { animate = true } = {}) {
    const [w, s, e, n] = bbox;
    if (!(e > w) || !(n > s)) {
      console.warn('fitToBbox: invalid bbox', bbox);
      return;
    }
    const mapEl = document.getElementById('map');
    const width = mapEl.clientWidth || window.innerWidth;
    const height = mapEl.clientHeight || window.innerHeight;
    const tmp = new WebMercatorViewport({ width, height, longitude: 0, latitude: 0, zoom: 0 });
    const fitted = tmp.fitBounds([[w, s], [e, n]], { padding: 40 });
    // Keep local viewState clean (no transition props). Otherwise rerender()
    // would re-pass them and either retrigger the transition or feed
    // WebMercatorViewport bogus extras when computing viewportBbox().
    const clean = {
      longitude: fitted.longitude,
      latitude: fitted.latitude,
      zoom: Math.max(0, Math.min(fitted.zoom, 18)),
      pitch: 0, bearing: 0,
    };
    viewState = clean;
    const wireVS = animate
      ? { ...clean, transitionDuration: 600, transitionInterpolator: new FlyToInterpolator() }
      : clean;
    console.log('fitToBbox', { bbox, width, height, viewState });
    deckInstance.setProps({ viewState: wireVS });
  }

  // ---------- Load + viewport workflow -------------------------------------

  async function loadFile(url) {
    queryToken++;
    const myToken = queryToken;
    currentUrl = url;
    hasFullFile = false;
    // Re-arm the user-interaction gate. Without this, loading a second
    // file in the same session would skip the gate (already true from
    // the previous file) and refresh during the new file's fly-to.
    userInteractionSeen = false;
    // Wire up the direct-download link to the file we're loading. Server
    // sends Content-Disposition: attachment via the Worker's R2 metadata
    // pass-through, so the `download` attribute + same-origin isn't
    // required — the browser saves the file as-is.
    downloadEl.href = url;
    downloadEl.setAttribute('download', url.split('/').pop() || 'data.parquet');
    downloadEl.hidden = false;
    setStatus('Inspecting file…');

    try {
      const { total, geomKind: gk, bbox: datasetBbox } = await inspectFile(url);
      if (myToken !== queryToken) return;
      totalCount = total;
      geomKind = gk;

      console.log('inspectFile result', { total, geomKind: gk, datasetBbox });

      // Fit to the full dataset extent before any data lands so the user
      // sees the right region while the feature query is still in flight.
      if (datasetBbox) fitToBbox(datasetBbox);
      setStatus(`File has ${total.toLocaleString()} ${gk} features. Loading…`);

      // Initial query — first MAX features in row order (Hilbert-clustered).
      // Labels included here because the file may fit entirely in the
      // initial query; if it does, hover tooltips work without a refetch.
      // simplifyReferenceBbox = datasetBbox so ST_Simplify uses a
      // tolerance scaled to the post-fit camera view — saves real
      // ST_AsWKB / parse cost on big polygon files.
      const data = await fetchFeatures(url, null, {
        withLabels: true,
        simplify: true,
        simplifyReferenceBbox: datasetBbox,
        shouldContinue: () => myToken === queryToken,
      });
      if (myToken !== queryToken) return;
      lastFeatures = data;
      const shown = dataRowCount(data);
      hasFullFile = shown < MAX_FEATURES;

      // Fall back to data-derived bbox if metadata didn't give us one.
      if (!datasetBbox) {
        const bbox = bboxFromData(data);
        if (bbox) fitToBbox(bbox);
      }
      rerender();

      setCounter(shown, total);
      setStatus(hasFullFile
        ? `Showing all ${shown.toLocaleString()} features.`
        : `Showing ${shown.toLocaleString()} of ${total.toLocaleString()} — pan/zoom to load other areas.`);
    } catch (e) {
      if (myToken !== queryToken) return;
      console.error(e);
      setStatus('Failed: ' + (e.message || e), true);
    }
  }

  function scheduleViewportRefresh(interactionState) {
    if (!currentUrl) {
      console.log('scheduleViewportRefresh: no currentUrl');
      return;
    }
    if (hasFullFile) {
      console.log('scheduleViewportRefresh: skipping, hasFullFile is true');
      return;
    }
    if (!userInteractionSeen) {
      console.log('scheduleViewportRefresh: skipping, no user interaction yet');
      return;
    }
    console.log('scheduleViewportRefresh: timer set', { interactionState });
    clearTimeout(viewportTimer);
    viewportTimer = setTimeout(refreshViewport, VIEWPORT_DEBOUNCE_MS);
  }

  async function refreshViewport() {
    if (!currentUrl || hasFullFile) return;
    // Only cancel if a query is actually in flight. cancelSent on an
    // idle connection produces an empty-message onMessage error that
    // breaks the very next send. The userInteractionSeen gate ensures
    // any cancel here is in response to real user input.
    if (inFlightCount > 0) {
      try { await conn.cancelSent(); } catch (_) {}
      // Give the worker a tick to settle before issuing the next send.
      // Without this small breathing room the next send sometimes still
      // catches the worker mid-cancel and rejects.
      await new Promise((r) => setTimeout(r, 50));
    }
    queryToken++;
    const myToken = queryToken;
    const bbox = viewportBbox();
    console.log('refreshViewport: firing, bbox =', bbox, 'viewState =', viewState);

    // Clear the map immediately so the gesture reads as "registered".
    // Otherwise the old SW-MA buildings keep rendering for the 30-60 s
    // it takes to cold-fetch the new area's row groups, and the user
    // can't tell whether anything is happening.
    lastFeatures = [];
    rerender();
    setStatus('Loading viewport (preview)…');

    // Heartbeat so the user sees the elapsed time tick up — looks like
    // progress, reads less like a hang.
    const refreshStart = performance.now();
    const heartbeat = setInterval(() => {
      if (myToken !== queryToken) { clearInterval(heartbeat); return; }
      const secs = Math.round((performance.now() - refreshStart) / 1000);
      setStatus(`Loading viewport (preview)… ${secs}s`);
    }, 1000);

    try {
      // Stage 1: keep it modest so something paints fast. No simplify
      // (saves spatial-extension CPU) and no labels (the tags MAP
      // column is often >50% of file bytes; skipping it cuts I/O and
      // ZSTD work). 5000 is dense enough to look like real coverage
      // even if stage 2 is slow.
      const STAGE1_LIMIT = 5000;
      const t0 = performance.now();
      const quick = await fetchFeatures(currentUrl, bbox, {
        limit: STAGE1_LIMIT,
        simplify: false,
        withLabels: false,
        shouldContinue: () => myToken === queryToken,
      });
      const quickRows = dataRowCount(quick);
      console.log(`refreshViewport: stage 1 (${quickRows} rows) in ${Math.round(performance.now() - t0)}ms`);
      if (myToken !== queryToken) return;
      lastFeatures = quick;
      rerender();
      setCounter(quickRows, totalCount);

      // Skip stage 2 entirely when stage 1 didn't fill its LIMIT —
      // there's nothing more to fetch for this viewport, and running
      // stage 2 just to confirm wastes a multi-second query on the
      // worker (the hang the user kept hitting).
      if (quickRows < STAGE1_LIMIT) {
        setStatus(`Showing ${quickRows.toLocaleString()} features in viewport.`);
        return;
      }
      setStatus(`Preview ready (${quickRows.toLocaleString()}). Loading full detail…`);

      // Stage 2: full LIMIT, with simplify, still no labels (tooltips
      // off until the user explicitly opts in — the I/O cost isn't
      // worth it for a quick visual check).
      try {
        const t1 = performance.now();
        const data = await fetchFeatures(currentUrl, bbox, {
          limit: MAX_FEATURES,
          simplify: true,
          withLabels: false,
          shouldContinue: () => myToken === queryToken,
        });
        const shown = dataRowCount(data);
        console.log(`refreshViewport: stage 2 (${shown} rows) in ${Math.round(performance.now() - t1)}ms`);
        if (myToken !== queryToken) return;
        lastFeatures = data;
        rerender();
        setCounter(shown, totalCount);
        setStatus(shown >= MAX_FEATURES
          ? `Showing ${shown.toLocaleString()} of ${totalCount.toLocaleString()} — zoom in further to see more.`
          : `Showing ${shown.toLocaleString()} features in viewport.`);
      } catch (e2) {
        if (myToken !== queryToken) return;
        console.error('refreshViewport: stage 2 failed, retrying without simplify:', e2);
        try {
          const data = await fetchFeatures(currentUrl, bbox, {
            limit: MAX_FEATURES,
            simplify: false,
            withLabels: false,
            shouldContinue: () => myToken === queryToken,
          });
          if (myToken !== queryToken) return;
          lastFeatures = data;
          rerender();
          const shown = dataRowCount(data);
          setCounter(shown, totalCount);
          setStatus(`Showing ${shown.toLocaleString()} features (no simplify).`);
        } catch (e3) {
          if (myToken !== queryToken) return;
          console.error('refreshViewport: stage 2 retry also failed:', e3);
          setStatus(`Preview only (${quickRows.toLocaleString()}) — full detail failed: ${e3.message || e3}`, true);
        }
      }
    } catch (e) {
      if (myToken !== queryToken) return;
      // Surface the most useful debug info on the console so the next
      // "still erroring" can name a SQL/spec mismatch instead of just
      // pointing at the catch block.
      console.error('refreshViewport failed:', {
        message: e.message,
        stack: e.stack,
        url: currentUrl,
        bbox,
        viewState,
        error: e,
      });
      setStatus('Viewport query failed: ' + (e.message || e), true);
    } finally {
      clearInterval(heartbeat);
    }
  }

  // ---------- User-interaction detection -----------------------------------

  // Real interactions only — captured at the source (mouse / wheel / touch)
  // so the FlyToInterpolator's synthetic onViewStateChange events can't
  // flip the gate and trigger a wipe-and-replace right after load.
  {
    const mapEl = document.getElementById('map');
    const markInteracted = () => { userInteractionSeen = true; };
    ['mousedown', 'wheel', 'touchstart', 'keydown'].forEach((evt) => {
      mapEl.addEventListener(evt, markInteracted, { capture: true, passive: true });
    });
  }

  // ---------- Wire up controls ---------------------------------------------

  const params = new URLSearchParams(location.search);
  urlEl.value = params.get('url') || DEFAULT_URL;

  function triggerLoad() {
    const u = urlEl.value.trim();
    if (!u) return;
    const next = new URL(location.href);
    next.searchParams.set('url', u);
    history.replaceState(null, '', next);
    loadFile(u);
  }

  loadBtn.addEventListener('click', triggerLoad);
  urlEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') triggerLoad(); });

  // Auto-load whatever's in the URL bar (default or ?url=). If deck has
  // already finished its first render (rare given init order), fire now;
  // otherwise stash the URL for the onLoad callback to pick up.
  if (urlEl.value) {
    const u = urlEl.value.trim();
    if (u) {
      const next = new URL(location.href);
      next.searchParams.set('url', u);
      history.replaceState(null, '', next);
      if (deckReady) loadFile(u);
      else pendingAutoLoadUrl = u;
    }
  }
</script>
</body>
